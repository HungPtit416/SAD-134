name: sad-ecommerce

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: product_db,cart_db,order_db,user_db,inventory_db,interaction_db,ai_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "5432:5432"

  product-service:
    build: ./services/product-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: product_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres
    ports:
      - "8001:8000"

  cart-service:
    build: ./services/cart-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: cart_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      PRODUCT_SERVICE_URL: http://product-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres
      - product-service
    ports:
      - "8002:8000"

  order-service:
    build: ./services/order-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: order_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CART_SERVICE_URL: http://cart-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres
      - cart-service
      - product-service
    ports:
      - "8003:8000"

  user-service:
    build: ./services/user-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: user_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres
    ports:
      - "8004:8000"

  inventory-service:
    build: ./services/inventory-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: inventory_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres:
        condition: service_started
      product-service:
        condition: service_started
    ports:
      - "8005:8000"

  interaction-service:
    build: ./services/interaction-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: interaction_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - postgres
    ports:
      - "8006:8000"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4j-password
    ports:
      - "7474:7474"
      - "7687:7687"

  ai-service:
    build: ./services/ai-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ai_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
      INTERACTION_SERVICE_URL: http://interaction-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j-password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-gemini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      SEQ_MODEL_PATH: /app/seq_model/model_best_lstm.keras
    volumes:
      - ./data:/app/data:ro
      - ./ml/artifacts/lstm:/app/seq_model:ro
      - ./reports:/app/reports
    depends_on:
      - postgres
      - interaction-service
      - product-service
      - neo4j
    ports:
      - "8007:8000"

  # Periodic sync_events_to_graph + train_behavior_embeddings. Start with: docker compose --profile scheduler up -d
  ai-scheduler:
    profiles:
      - scheduler
    build: ./services/ai-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ai_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      INTERACTION_SERVICE_URL: http://interaction-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j-password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-gemini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      AI_CRON_INTERVAL_SECONDS: ${AI_CRON_INTERVAL_SECONDS:-3600}
      SEQ_MODEL_PATH: /app/seq_model/model_best_lstm.keras
    volumes:
      - ./ml/artifacts/lstm:/app/seq_model:ro
      - ./reports:/app/reports
    depends_on:
      - postgres
      - interaction-service
      - product-service
      - neo4j
    command: ["sh", "/app/scripts/scheduler.sh"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PRODUCT_API_BASE: http://localhost:8001
        VITE_CART_API_BASE: http://localhost:8002
        VITE_ORDER_API_BASE: http://localhost:8003
        VITE_INVENTORY_API_BASE: http://localhost:8005
        VITE_USER_API_BASE: http://localhost:8004
        VITE_INTERACTION_API_BASE: http://localhost:8006
        VITE_AI_API_BASE: http://localhost:8007
    depends_on:
      - product-service
      - cart-service
      - order-service
      - interaction-service
      - ai-service
    ports:
      - "3000:80"

volumes:
  pgdata:

