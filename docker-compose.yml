name: sad-ecommerce

services:
  # One database container per service (infrastructure-level separation)
  postgres-product:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_db
    volumes:
      - pgdata_product:/var/lib/postgresql/data

  postgres-cart:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cart_db
    volumes:
      - pgdata_cart:/var/lib/postgresql/data

  postgres-order:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    volumes:
      - pgdata_order:/var/lib/postgresql/data

  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    volumes:
      - pgdata_user:/var/lib/postgresql/data

  postgres-inventory:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db
    volumes:
      - pgdata_inventory:/var/lib/postgresql/data

  postgres-interaction:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interaction_db
    volumes:
      - pgdata_interaction:/var/lib/postgresql/data

  postgres-payment:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    volumes:
      - pgdata_payment:/var/lib/postgresql/data

  postgres-shipping:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shipping_db
    volumes:
      - pgdata_shipping:/var/lib/postgresql/data

  # AI DB uses pgvector image
  postgres-ai:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_db
    volumes:
      - pgdata_ai:/var/lib/postgresql/data

  product-service:
    build: ./services/product-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-product
      DATABASE_PORT: "5432"
      DATABASE_NAME: product_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres-product
    ports:
      - "8001:8000"

  cart-service:
    build: ./services/cart-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-cart
      DATABASE_PORT: "5432"
      DATABASE_NAME: cart_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      PRODUCT_SERVICE_URL: http://product-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres-cart
      - product-service
    ports:
      - "8002:8000"

  order-service:
    build: ./services/order-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-order
      DATABASE_PORT: "5432"
      DATABASE_NAME: order_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CART_SERVICE_URL: http://cart-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      SHIPPING_SERVICE_URL: http://shipping-service:8000
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres-order
      - cart-service
      - product-service
      - payment-service
      - shipping-service
    ports:
      - "8003:8000"

  user-service:
    build: ./services/user-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-user
      DATABASE_PORT: "5432"
      DATABASE_NAME: user_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres-user
    ports:
      - "8004:8000"

  inventory-service:
    build: ./services/inventory-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-inventory
      DATABASE_PORT: "5432"
      DATABASE_NAME: inventory_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres-inventory:
        condition: service_started
      product-service:
        condition: service_started
    ports:
      - "8005:8000"

  interaction-service:
    build: ./services/interaction-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-interaction
      DATABASE_PORT: "5432"
      DATABASE_NAME: interaction_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - postgres-interaction
    ports:
      - "8006:8000"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4j-password
    ports:
      - "7474:7474"
      - "7687:7687"

  ai-service:
    build: ./services/ai-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-ai
      DATABASE_PORT: "5432"
      DATABASE_NAME: ai_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
      INTERACTION_SERVICE_URL: http://interaction-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j-password
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      SEQ_MODEL_PATH: /app/seq_model/model_best_lstm.keras
    volumes:
      - ./data:/app/data:ro
      - ./ml/artifacts/lstm:/app/seq_model:ro
      - ./reports:/app/reports
    depends_on:
      - postgres-ai
      - interaction-service
      - product-service
      - neo4j
    ports:
      - "8007:8000"

  payment-service:
    build: ./services/payment-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-payment
      DATABASE_PORT: "5432"
      DATABASE_NAME: payment_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_PAYMENT_URL: ${VNPAY_PAYMENT_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:3000/payment-return}
    depends_on:
      - postgres-payment
    ports:
      - "8008:8000"

  shipping-service:
    build: ./services/shipping-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-shipping
      DATABASE_PORT: "5432"
      DATABASE_NAME: shipping_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      CORS_ALLOW_ALL_ORIGINS: "1"
    depends_on:
      - postgres-shipping
    ports:
      - "8009:8000"

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - inventory-service
      - interaction-service
      - ai-service
      - payment-service
      - shipping-service
    ports:
      - "8080:80"

  # Periodic sync_events_to_graph + train_behavior_embeddings. Start with: docker compose --profile scheduler up -d
  ai-scheduler:
    profiles:
      - scheduler
    build: ./services/ai-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_HOST: postgres-ai
      DATABASE_PORT: "5432"
      DATABASE_NAME: ai_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      INTERACTION_SERVICE_URL: http://interaction-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j-password
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      AI_CRON_INTERVAL_SECONDS: ${AI_CRON_INTERVAL_SECONDS:-3600}
      SEQ_MODEL_PATH: /app/seq_model/model_best_lstm.keras
    volumes:
      - ./ml/artifacts/lstm:/app/seq_model:ro
      - ./reports:/app/reports
    depends_on:
      - postgres-ai
      - interaction-service
      - product-service
      - neo4j
    command: ["sh", "/app/scripts/scheduler.sh"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PRODUCT_API_BASE: http://localhost:8080/product
        VITE_CART_API_BASE: http://localhost:8080/cart
        VITE_ORDER_API_BASE: http://localhost:8080/order
        VITE_INVENTORY_API_BASE: http://localhost:8080/inventory
        VITE_USER_API_BASE: http://localhost:8080/user
        VITE_INTERACTION_API_BASE: http://localhost:8080/interaction
        VITE_AI_API_BASE: http://localhost:8080/ai
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/custom.css:/usr/share/nginx/html/custom.css:ro
      - ./frontend/custom.js:/usr/share/nginx/html/custom.js:ro
    depends_on:
      - product-service
      - cart-service
      - order-service
      - interaction-service
      - ai-service
      - gateway
    ports:
      - "3000:80"

volumes:
  pgdata_product:
  pgdata_cart:
  pgdata_order:
  pgdata_user:
  pgdata_inventory:
  pgdata_interaction:
  pgdata_ai:
  pgdata_payment:
  pgdata_shipping:

