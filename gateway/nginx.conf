worker_processes  1;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Helpful for local dev (avoid buffering large JSON)
  proxy_buffering off;

  # --- Routing rules (single entry point) ---
  # Convention: each service is mounted under a prefix:
  #   /user/ -> user-service
  #   /product/ -> product-service
  #   /cart/ -> cart-service
  #   /order/ -> order-service
  #   /inventory/ -> inventory-service
  #   /interaction/ -> interaction-service
  #   /ai/ -> ai-service
  #   /payment/ -> payment-service
  #   /shipping/ -> shipping-service
  #
  # Each upstream expects paths like /api/... so we preserve the suffix.

  server {
    listen 80;

    # Strip upstream CORS headers to avoid duplicates like "*, http://localhost:3000"
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;

    # Simple liveness
    location = /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # --- CORS (dev-friendly) ---
    # Handle browser preflight at the gateway.
    location / {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
    }

    # Attach CORS headers to all proxied responses.
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Type" always;

    # Generic proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- JWT verification via auth_request ---
    # We delegate token validation to user-service (DRF SimpleJWT).
    # Protected routes will call this internal location; if it returns 2xx -> allow, else 401.
    location = /_auth {
      internal;
      proxy_pass http://user-service:8000/api/auth/verify/;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
    }

    # Capture authenticated user id from auth subrequest response header.
    # user-service sets: X-User-Id: <username/email>
    auth_request_set $auth_user_id $upstream_http_x_user_id;

    location /user/ {
      proxy_pass http://user-service:8000/;
    }
    location /product/ {
      proxy_pass http://product-service:8000/;
    }
    location /cart/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
      auth_request /_auth;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_pass http://cart-service:8000/;
    }
    location /order/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
      auth_request /_auth;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_pass http://order-service:8000/;
    }
    location /inventory/ {
      proxy_pass http://inventory-service:8000/;
    }
    location /interaction/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
      auth_request /_auth;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_pass http://interaction-service:8000/;
    }
    location /ai/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
      auth_request /_auth;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_pass http://ai-service:8000/;
    }
    location /payment/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
      auth_request /_auth;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_pass http://payment-service:8000/;
    }
    location /shipping/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
      proxy_pass http://shipping-service:8000/;
    }

    # Frontend (optional): keep current port 3000; we don't proxy it by default.
  }
}

