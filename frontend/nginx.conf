server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Inject a lightweight override stylesheet (no rebuild needed)
  sub_filter_types text/html;
  sub_filter '</head>' '<link rel="stylesheet" href="/custom.css"><script defer src="/custom.js"></script></head>';
  sub_filter_once on;

  # Avoid stale UI when we hotfix via custom.js/custom.css
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location = /custom.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location = /custom.css {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  # SPA routing: serve index.html for client-side routes (/login, /cart, ...)
  location / {
    try_files $uri $uri/ /index.html;
  }
}

